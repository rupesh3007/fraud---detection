name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run pytest
        run: pytest -q
      
      - name: Check syntax
        run: python -m py_compile main.py pipeline.py run_analysis.py

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Check build output
        run: test -d dist && echo "Build successful" || exit 1

  deploy-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Check deployment config
        run: |
          echo "✓ Backend Procfile exists"
          test -f backend/Procfile && echo "✓ Procfile found" || echo "⚠ Procfile missing"
          
          echo "✓ Frontend Netlify config"
          test -f frontend/netlify.toml && echo "✓ netlify.toml found" || echo "⚠ netlify.toml missing"
          
          echo "✓ Frontend Vercel config"
          test -f frontend/vercel.json && echo "✓ vercel.json found" || echo "⚠ vercel.json missing"
      
      - name: Deployment ready
        run: echo "✅ All checks passed. Ready for deployment."
